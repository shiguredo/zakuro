name: e2e-test

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      from_build:
        type: boolean
        default: false
        description: "build.yml から呼び出されたかどうか"
  push:
    branches:
      - "develop"
      - "feature/**"
    paths:
      - "python/**"
      - ".github/workflows/e2e-test.yml"

env:
  TEST_SIGNALING_URLS: ${{ secrets.TEST_SIGNALING_URLS }}
  TEST_CHANNEL_ID_PREFIX: ${{ secrets.TEST_CHANNEL_ID_PREFIX }}
  TEST_SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}

jobs:
  e2e_test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # GitHub-hosted runners
          - package: ubuntu-22.04_x86_64
            runs_on: ubuntu-22.04
          - package: ubuntu-24.04_x86_64
            runs_on: ubuntu-24.04
          - package: macos_arm64
            runs_on: macos-15
    name: E2E Test ${{ matrix.package }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # ランタイム依存関係のインストール (Ubuntu のみ)
      - name: Install runtime dependencies
        if: startsWith(matrix.package, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates libdrm2 libva2 libva-drm2

      # zakuro バイナリのダウンロード
      - name: Download and extract zakuro binary
        uses: ./.github/actions/download-binary
        with:
          platform: ${{ matrix.package }}
          github-token: ${{ github.token }}
          from-build: ${{ inputs.from_build }}

      # UV のセットアップ
      - uses: astral-sh/setup-uv@v7
      - run: uv sync

      # E2E テストの実行
      - name: Run E2E tests
        run: uv run pytest -v

  slack_notify_failed:
    needs: [e2e_test]
    runs-on: ubuntu-24.04
    # always() で常に実行し、needs.e2e_test.result で親ジョブの結果を確認
    # タイムアウトは 'failure' として扱われる
    # build.yml から呼び出された場合は通知しない
    if: always() && (needs.e2e_test.result == 'failure' || needs.e2e_test.result == 'cancelled') && inputs.from_build != true
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: zakuro
          SLACK_COLOR: danger
          SLACK_TITLE: "FAILED"
          SLACK_ICON_EMOJI: ":japanese_ogre:"
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
